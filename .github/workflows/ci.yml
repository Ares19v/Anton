name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + test ───────────────────────────────────────────────────
  backend:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Download NLTK corpora
        run: python backend/download_data.py

      - name: Run test suite
        working-directory: backend
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          ADMIN_KEY: ci-test-admin-key
          GROQ_API_KEY: fake-key-tests-mock-groq-calls
          DATABASE_URL: sqlite:///./test_anton.db
        run: pytest tests/ -v --tb=short

  # ── Frontend: install + build ──────────────────────────────────────────────
  frontend:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build
