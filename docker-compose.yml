services:
  # ---------------------------------------------------------------------------
  # ANTON Backend — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: anton_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - DATABASE_URL=sqlite:///./anton.db
    volumes:
      # Mount the backend source for live-reload during development
      - ./backend:/app
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ANTON Frontend — React / Vite
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: anton_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped
