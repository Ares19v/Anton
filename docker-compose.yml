services:
  # ---------------------------------------------------------------------------
  # ANTON Backend — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: anton_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - DATABASE_URL=sqlite:///./anton.db
    volumes:
      # Mount the backend source for live-reload during development
      - ./backend:/app
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ANTON Frontend — React / Vite (nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: anton_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
